  <path d="M200,180 L660,180" stroke="#0369a1" stroke-width="2" marker-end="url(#arr)" />
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0369a1" />
