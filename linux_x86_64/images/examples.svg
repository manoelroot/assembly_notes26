<svg xmlns="http://www.w3.org/2000/svg" width="820" height="280">
  <style>
    .box { fill:#f1f5f9; stroke:#0f172a; stroke-width:2px; }
    .text { font: 14px sans-serif; fill:#0f172a; }
    .title { font: 18px sans-serif; font-weight:bold; }
  </style>
  <rect class="box" x="60" y="60" width="240" height="120" rx="14"/>
  <rect class="box" x="300" y="60" width="240" height="120" rx="14"/>
  <rect class="box" x="540" y="60" width="240" height="120" rx="14"/>
  <text class="text title" x="105" y="95">Hello World</text>
  <text class="text" x="80" y="125">syscall write</text>
  <text class="text" x="80" y="145">_start direto</text>
  <text class="text title" x="325" y="95">Loops</text>
  <text class="text" x="320" y="125">dec/jnz</text>
  <text class="text" x="320" y="145">controle de fluxo</text>
  <text class="text title" x="595" y="95">Bitwise</text>
  <text class="text" x="560" y="125">and, or, xor</text>
  <text class="text" x="560" y="145">máscaras</text>
  <path d="M180,180 L180,210 L600,210" stroke="#0f172a" stroke-width="2" marker-end="url(#arr)" />
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f172a" />
    </marker>
  </defs>
  <text class="text" x="60" y="40">Exemplos práticos: comece com Hello World e avance para padrões úteis</text>
</svg>