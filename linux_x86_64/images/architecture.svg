<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450">
  <style>
    .box { fill:#f8fafc; stroke:#1f2937; stroke-width:2px; }
    .text { font: 16px sans-serif; fill:#111827; }
    .title { font: 20px sans-serif; font-weight:bold; }
  </style>
  <rect class="box" x="50" y="60" width="220" height="80" rx="12"/>
  <text class="text title" x="70" y="90">.text</text>
  <text class="text" x="70" y="115">Código executável</text>
  <rect class="box" x="290" y="60" width="220" height="80" rx="12"/>
  <text class="text title" x="310" y="90">.data</text>
  <text class="text" x="310" y="115">Dados inicializados</text>
  <rect class="box" x="530" y="60" width="220" height="80" rx="12"/>
  <text class="text title" x="550" y="90">.bss</text>
  <text class="text" x="550" y="115">Dados não inicializados</text>
  <rect class="box" x="180" y="200" width="220" height="80" rx="12"/>
  <text class="text title" x="200" y="230">Heap</text>
  <text class="text" x="200" y="255">Alocação dinâmica</text>
  <rect class="box" x="420" y="200" width="220" height="80" rx="12"/>
  <text class="text title" x="450" y="230">Stack</text>
  <text class="text" x="450" y="255">Frames de função</text>
  <polygon points="160,140 235,140 235,185 140,185" fill="none" stroke="#1f2937" stroke-width="2" />
  <polygon points="400,140 475,140 475,185 380,185" fill="none" stroke="#1f2937" stroke-width="2" />
  <polygon points="440,140 515,140 515,185 420,185" fill="none" stroke="#1f2937" stroke-width="2" />
  <path d="M200,180 L200,200" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M420,180 L420,200" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)" />
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2937" />
    </marker>
  </defs>
  <text class="text" x="50" y="30">Processo Linux x86_64 - Layout de memória</text>
</svg>